name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Clean previous builds
      run: |
        flutter clean
        rm -rf android/app/src/main/java
        rm -rf android/app/src/main/kotlin

    - name: Get Flutter packages
      run: flutter pub get

    - name: Recreate Android project
      run: |
        flutter create --platforms=android --project-name=flex_yemen_temp --org com.flexyemen ./temp_project
        rm -rf android
        cp -r temp_project/android .
        rm -rf temp_project

    - name: Update Gradle config
      run: |
        # تحديث إعدادات SDK
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
        sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
