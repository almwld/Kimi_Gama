name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Create Android project from scratch
      run: |
        # إنشاء مجلد android من الصفر باستخدام flutter create
        flutter create --platforms=android --project-name=flex_yemen --org com.flexyemen ./temp_android
        # نسخ مجلد android إلى المشروع
        cp -r temp_android/android .
        # تنظيف الملفات المؤقتة
        rm -rf temp_android

    - name: Update Gradle config
      run: |
        # تحديث إصدارات SDK
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle
        sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle
        # تحديث إصدار Kotlin
        sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = '\''1.7.1'\''/' android/build.gradle

    - name: Build APK (split per ABI)
      run: |
        flutter build apk --release --split-per-abi
        # إعادة تسمية الملفات لتكون أكثر وضوحاً
        mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/flex-yemen-armeabi-v7a.apk 2>/dev/null || true
        mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/flex-yemen-arm64-v8a.apk 2>/dev/null || true
        mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/flex-yemen-x86_64.apk 2>/dev/null || true

    - name: Upload APK (ARMv7)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-armeabi-v7a
        path: build/app/outputs/flutter-apk/flex-yemen-armeabi-v7a.apk

    - name: Upload APK (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-arm64-v8a
        path: build/app/outputs/flutter-apk/flex-yemen-arm64-v8a.apk

    - name: Upload APK (x86_64)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-x86_64
        path: build/app/outputs/flutter-apk/flex-yemen-x86_64.apk
