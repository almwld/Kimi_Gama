name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Build
      run: |
        mkdir /tmp/code
        cp -r lib /tmp/code/
        cp -r assets /tmp/code/ 2>/dev/null || true
        cp pubspec.yaml /tmp/code/
        
        rm -rf android ios
        
        flutter create --org com.kimigama --project-name kimigama --platforms android .
        
        rm -rf lib assets
        cp -r /tmp/code/lib .
        cp -r /tmp/code/assets . 2>/dev/null || true
        cp /tmp/code/pubspec.yaml .
        
        mkdir -p assets/images assets/icons assets/fonts
        
        # إضافة namespace
        sed -i '/android {/a \    namespace "com.kimigama.app"' android/app/build.gradle
        
        # رفع minSdkVersion
        sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android/app/build.gradle
        
        # إضافة flutterEmbedding
        sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        
        # تحديث gradle-wrapper إلى 8.9
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
        
        # إعداد Kotlin 1.9.22
        cat > android/settings.gradle << 'SETTINGS'
        pluginManagement {
            def flutterSdkPath = {
                def properties = new Properties()
                file("local.properties").withInputStream { properties.load(it) }
                def flutterSdkPath = properties.getProperty("flutter.sdk")
                assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                return flutterSdkPath
            }()
            includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        plugins {
            id "dev.flutter.flutter-plugin-loader" version "1.0.0"
            id "com.android.application" version "8.7.0" apply false
            id "org.jetbrains.kotlin.android" version "1.9.22" apply false
        }
        include ":app"
        SETTINGS
        
        # تنظيف cache بالكامل
        rm -rf ~/.gradle/caches/
        
        flutter pub get
        flutter build apk --release --split-per-abi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk
