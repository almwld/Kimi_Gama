name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Build
      run: |
        mkdir /tmp/code
        cp -r lib /tmp/code/
        cp -r assets /tmp/code/ 2>/dev/null || true
        cp pubspec.yaml /tmp/code/
        
        rm -rf android ios
        
        flutter create --org com.kimigama --project-name kimigama --platforms android .
        
        rm -rf lib assets
        cp -r /tmp/code/lib .
        cp -r /tmp/code/assets . 2>/dev/null || true
        cp /tmp/code/pubspec.yaml .
        
        mkdir -p assets/images assets/icons assets/fonts
        
        # خفض path_provider
        sed -i 's/path_provider:.*/path_provider: ^2.0.0/' pubspec.yaml
        
        # رفع minSdkVersion إلى 21
        sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android/app/build.gradle
        
        # إضافة namespace
        sed -i '/android {/a \    namespace "com.kimigama.app"' android/app/build.gradle
        
        # إضافة flutterEmbedding
        sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        
        # تنظيف cache
        rm -rf ~/.gradle/caches/
        
        flutter pub get
        flutter build apk --release --split-per-abi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk
