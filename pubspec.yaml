name: flex_yemen
description: "Flex Yemen - منصة تجارة إلكترونية يمنية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  supabase_flutter: ^2.5.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.0
  dotted_border: ^2.1.0
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.0
  dropdown_button2: ^2.3.9
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.1
  timeline_tile: ^2.0.0
  flutter_staggered_grid_view: ^0.7.0
  confetti: ^0.7.0
  lottie: ^3.1.0
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Changa-Bold.ttf
          weight: 700
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#D4AF37"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
