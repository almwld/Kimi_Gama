name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Build
      run: |
        mkdir /tmp/code
        cp -r lib /tmp/code/
        cp -r assets /tmp/code/ 2>/dev/null || true
        cp pubspec.yaml /tmp/code/
        
        rm -rf android ios
        
        flutter create --org com.kimigama --project-name kimigama --platforms android .
        
        rm -rf lib assets
        cp -r /tmp/code/lib .
        cp -r /tmp/code/assets . 2>/dev/null || true
        cp /tmp/code/pubspec.yaml .
        
        mkdir -p assets/images assets/icons assets/fonts
        
        # خفض path_provider
        sed -i 's/path_provider:.*/path_provider: ^2.0.0/' pubspec.yaml
        
        # إعادة كتابة app/build.gradle بقيم ثابتة
        cat > android/app/build.gradle << 'APP'
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }
        
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }
        
        def flutterVersionCode = localProperties.getProperty('flutter.versionCode', '1')
        def flutterVersionName = localProperties.getProperty('flutter.versionName', '1.0')
        
        android {
            namespace "com.kimigama.app"
            compileSdkVersion 34
            ndkVersion "27.0.12077973"
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
                coreLibraryDesugaringEnabled true
            }
            
            kotlinOptions {
                jvmTarget = '17'
            }
            
            sourceSets {
                main.java.srcDirs += 'src/main/kotlin'
            }
            
            defaultConfig {
                applicationId "com.kimigama.app"
                minSdkVersion 21
                targetSdkVersion 34
                versionCode flutterVersionCode.toInteger()
                versionName flutterVersionName
                multiDexEnabled true
            }
            
            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                    minifyEnabled true
                    shrinkResources true
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }
        }
        
        flutter {
            source '../..'
        }
        
        dependencies {
            implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
            implementation 'androidx.multidex:multidex:2.0.1'
            coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
        }
        APP
        
        # إضافة flutterEmbedding
        sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        
        # تنظيف cache
        rm -rf ~/.gradle/caches/
        
        flutter pub get
        flutter build apk --release --split-per-abi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk
