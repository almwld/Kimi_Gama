name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get

    - name: Create Android project from scratch
      run: |
        flutter create --platforms=android --project-name=flex_yemen --org com.flexyemen ./temp_android
        cp -r temp_android/android .
        rm -rf temp_android

    - name: Fix Kotlin version to 1.9.0
      run: |
        sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = '\''1.9.0'\''/' android/build.gradle
        echo 'distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-all.zip' > android/gradle/wrapper/gradle-wrapper.properties
        sed -i 's/compileSdk [0-9]*/compileSdk 34/' android/app/build.gradle
        sed -i 's/targetSdk [0-9]*/targetSdk 34/' android/app/build.gradle
        sed -i 's/minSdk [0-9]*/minSdk 21/' android/app/build.gradle

    - name: Build APK (split per ABI)
      run: |
        flutter build apk --release --split-per-abi

    - name: Upload APK (ARMv7)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

    - name: Upload APK (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-arm64-v8a
        path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

    - name: Upload APK (x86_64)
      uses: actions/upload-artifact@v4
      with:
        name: flex-yemen-x86_64
        path: build/app/outputs/flutter-apk/app-x86_64-release.apk
