name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Create Android folder
        run: |
          flutter create --platforms=android --project-name=temp --org com.example ./temp
          cp -r temp/android .
          rm -rf temp
      
      - name: Fix Kotlin version
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' android/build.gradle
          sed -i 's/compileSdk [0-9]*/compileSdk 34/' android/app/build.gradle
          sed -i 's/targetSdk [0-9]*/targetSdk 34/' android/app/build.gradle
          sed -i 's/minSdk [0-9]*/minSdk 21/' android/app/build.gradle
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
